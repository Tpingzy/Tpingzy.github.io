name: Update KP Full Stats

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Fetch KP data
        run: |
          curl "https://www.balldontlie.io/api/v1/stats?player_ids[]=322&per_page=5" > raw.json

      - name: Process data
        run: |
          pts=$(jq '[.data[].pts] | add' raw.json)
          reb=$(jq '[.data[].reb] | add' raw.json)
          ast=$(jq '[.data[].ast] | add' raw.json)
          blk=$(jq '[.data[].blk] | add' raw.json)

          g1=$(jq '.data[0].pts' raw.json)
          g2=$(jq '.data[1].pts' raw.json)
          g3=$(jq '.data[2].pts' raw.json)
          g4=$(jq '.data[3].pts' raw.json)
          g5=$(jq '.data[4].pts' raw.json)

          echo "{
            \"name\": \"Kristaps Porzingis\",
            \"pts\": $pts,
            \"reb\": $reb,
            \"ast\": $ast,
            \"blk\": $blk,
            \"games\": [$g1,$g2,$g3,$g4,$g5]
          }" > stats.json

      - name: Commit & Push
        run: |
          git config --global user.name "tpingzy-bot"
          git config --global user.email "bot@tpingzy.com"
          git add stats.json
          git commit -m "update full stats" || echo "no changes"
          git push

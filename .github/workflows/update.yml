name: Update KP Stats

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Update stats
        run: |
          echo '{
            "name": "Kristaps Porzingis",
            "pts": '$((RANDOM%30+10))',
            "reb": '$((RANDOM%10+3))',
            "ast": '$((RANDOM%5+1))',
            "blk": '$((RANDOM%4))
          }' > stats.json

      - name: Commit
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@bot.com"
          git add stats.json
          git commit -m "update" || echo "no change"
          git push

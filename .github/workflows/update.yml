name: Update KP Full Stats

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch KP data
        run: |
          curl --fail --silent --show-error --max-time 20 \
          "https://api.balldontlie.io/v1/stats?player_ids[]=322&per_page=5" \
          > raw.json

      - name: Process data
        run: |
          pts=$(jq '[.data[].pts // 0] | add' raw.json)
          reb=$(jq '[.data[].reb // 0] | add' raw.json)
          ast=$(jq '[.data[].ast // 0] | add' raw.json)
          blk=$(jq '[.data[].blk // 0] | add' raw.json)

          games=$(jq '[.data[].pts // 0]' raw.json)

          echo "{
            \"name\": \"Kristaps Porzingis\",
            \"pts\": $pts,
            \"reb\": $reb,
            \"ast\": $ast,
            \"blk\": $blk,
            \"games\": $games
          }" > stats.json

      - name: Commit & Push
        run: |
          git config --global user.name "tpingzy-bot"
          git config --global user.email "bot@tpingzy.com"

          git add stats.json

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "update full stats"
          git push

name: Update Tingus Pingus Stats

on:
  schedule:
    - cron: '0 8 * * *' # 每日 UTC 8:00 執行
  workflow_dispatch: # 容許你喺 GitHub 手動撳掣執行

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 畀權限 Actions 去更改檔案

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install nba_api pandas requests

      - name: Run Python Script
        run: python update_stats.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json
          git commit -m "Auto-update Tingus Pingus stats 🦄" || exit 0
          git push

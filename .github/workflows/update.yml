name: Update KP Full Stats

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

# 授權 Bot 寫入 Repo 權限
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch KP data
        run: |
          curl --fail --silent --show-error --max-time 20 \
          -H "Authorization: d20ba6d2-5739-4a35-aa5c-2f309f6930a6" \
          "https://api.balldontlie.io/v1/stats?player_ids[]=322&per_page=5" \
          > raw.json

      - name: Process data
        run: |
          # 加總最近 5 場數據
          pts=$(jq '[.data[].pts // 0] | add' raw.json)
          reb=$(jq '[.data[].reb // 0] | add' raw.json)
          ast=$(jq '[.data[].ast // 0] | add' raw.json)
          blk=$(jq '[.data[].blk // 0] | add' raw.json)
          
          # 計算實際場數
          games=$(jq '.data | length' raw.json)

          # 輸出成 stats.json
          echo "{
            \"name\": \"Kristaps Porzingis\",
            \"pts\": $pts,
            \"reb\": $reb,
            \"ast\": $ast,
            \"blk\": $blk,
            \"games\": $games,
            \"updated_at\": \"$(date)\"
          }" > stats.json

      - name: Commit & Push
        run: |
          git config --global user.name "tpingzy-bot"
          git config --global user.email "bot@tpingzy.com"

          git add stats.json

          # 如果數據冇變就唔 commit
          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "update full stats for KP"
        
          git push

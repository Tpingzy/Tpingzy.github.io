name: Update Porzingis Stats

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Fetch and Update Stats
        run: node scripts/fetch-stats.js

      - name: Commit Changes
        run: |
          git config user.name "GitHub Bot"
          git config user.email "bot@github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update Porzingis stats" && git push)

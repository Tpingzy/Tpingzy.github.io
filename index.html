<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kristaps Porzingis Scoring Statistics</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Player Header -->
        <div class="header">
            <h1>Kristaps Porzingis 🏀</h1>
            <p class="subtitle">NBA Scoring Statistics</p>
        </div>

        <!-- Player Information -->
        <div class="player-info">
            <div class="info-box">
                <span class="label">Team</span>
                <span class="value" id="team">Boston Celtics</span>
            </div>
            <div class="info-box">
                <span class="label">Position</span>
                <span class="value">Power Forward / Center</span>
            </div>
            <div class="info-box">
                <span class="label">Height</span>
                <span class="value">7'3" (221 cm)</span>
            </div>
        </div>

        <!-- Statistics Table -->
        <div class="stats-section">
            <h2>Season Scoring Statistics</h2>
            <table class="stats-table">
                <thead>
                    <tr>
                        <th>Season</th>
                        <th>Team</th>
                        <th>Games</th>
                        <th>PPG</th>
                        <th>Total Points</th>
                    </tr>
                </thead>
                <tbody id="stats-body">
                    <!-- JavaScript will fill this -->
                </tbody>
            </table>
        </div>

        <!-- Recent Games -->
        <div class="recent-section">
            <h2>Recent Scoring</h2>
            <div class="recent-games" id="recent-games">
                <!-- JavaScript will fill this -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tpingzy Stats Lab</title>
  <style>
    body {
      background: #0a0a0a;
      color: #00ffcc;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
    }
    h1 {
      font-size: 32px;
    }
    .quote {
      color: #aaa;
      margin-bottom: 30px;
    }
    .card {
      background: #111;
      padding: 20px;
      margin: 10px;
      border-radius: 15px;
      display: inline-block;
      width: 120px;
    }
    .big {
      font-size: 28px;
      font-weight: bold;
    }
    .games {
      margin-top: 30px;
      color: #fff;
    }
  </style>
</head>
<body>

<h1>🦄 Tpingzy Stats Lab</h1>
<div class="quote">"Who the f*** is Tingus Pingus?"</div>

<div class="card">
  🔥 Points
  <div id="pts" class="big">-</div>
</div>

<div class="card">
  🗼 Rebounds
  <div id="reb" class="big">-</div>
</div>

<div class="card">
  🎯 Assists
  <div id="ast" class="big">-</div>
</div>

<div class="card">
  ❌ Blocks
  <div id="blk" class="big">-</div>
</div>

<div class="games">
  <h2>📊 Last 5 Games</h2>
  <div id="games">Loading...</div>
</div>

<script>
// 最新一場
fetch("https://www.balldontlie.io/api/v1/stats?player_ids[]=322&per_page=1")
  .then(res => res.json())
  .then(data => {
    const game = data.data[0];

    document.getElementById("pts").innerText = game.pts;
    document.getElementById("reb").innerText = game.reb;
    document.getElementById("ast").innerText = game.ast;
    document.getElementById("blk").innerText = game.blk;
  })
  .catch(() => {
    document.getElementById("pts").innerText = "Error";
  });

// 最近5場
fetch("https://www.balldontlie.io/api/v1/stats?player_ids[]=322&per_page=5")
  .then(res => res.json())
  .then(data => {
    const games = data.data.map(g => g.pts);
    document.getElementById("games").innerText = games.join(" / ");
  })
  .catch(() => {
    document.getElementById("games").innerText = "Error loading games";
  });

</script>

</body>
</html>

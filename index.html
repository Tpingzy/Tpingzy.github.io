<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tpingzy Stats Lab</title>

  <style>
    body {
      background: #0a0a0f;
      color: #fff;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      color: #9b5cff;
    }

    .card {
      background: #1a1a2e;
      padding: 20px;
      margin: 10px;
      border-radius: 15px;
      display: inline-block;
      width: 160px;
    }
  </style>
</head>

<body>

<h1>🦄 Tpingzy Stats Lab</h1>
<p>"Who the f*** is Tingus Pingus?"</p>

<div id="stats">Loading...</div>

<script>
async function loadData() {
  const res = await fetch("stats.json");
  const data = await res.json();

  document.getElementById("stats").innerHTML = `
    <div class="card">🔥 Points<br>${data.pts}</div>
    <div class="card">🗼 Rebounds<br>${data.reb}</div>
    <div class="card">🎯 Assists<br>${data.ast}</div>
    <div class="card">❌ Blocks<br>${data.blk}</div>
  `;
}

loadData();
</script>

</body>
</html>

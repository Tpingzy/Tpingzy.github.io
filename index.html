<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kristaps Porzingis Stats</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        h2 {
            color: #333;
            margin-top: 40px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-label {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .stat-value {
            font-size: 28px;
            font-weight: bold;
        }
        .games-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }
        .games-table th {
            background: #667eea;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: bold;
        }
        .games-table td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }
        .games-table tr:hover {
            background: #f5f5f5;
        }
        .win {
            color: #4caf50;
            font-weight: bold;
        }
        .loss {
            color: #f44336;
            font-weight: bold;
        }
        .loading {
            text-align: center;
            color: #666;
            padding: 40px;
        }
        .career-milestones {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .milestone-card {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
        }
        .milestone-label {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 10px;
        }
        .milestone-value {
            font-size: 24px;
            font-weight: bold;
        }
        .last-updated {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 20px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏀 Kristaps Porzingis</h1>
        <p class="subtitle">NBA Statistics Dashboard (Auto-Updated)</p>
        
        <!-- Season Stats -->
        <h2>2024-2025 Season Stats</h2>
        <div class="stats-grid" id="seasonStats">
            <div class="loading">Loading stats...</div>
        </div>

        <!-- Career Milestones -->
        <h2>Career Milestones</h2>
        <div class="career-milestones" id="careerStats">
            <div class="loading">Loading career data...</div>
        </div>

        <!-- Recent Games -->
        <h2>Recent Games</h2>
        <table class="games-table" id="recentGames">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Opponent</th>
                    <th>Result</th>
                    <th>Points</th>
                    <th>Rebounds</th>
                    <th>Assists</th>
                </tr>
            </thead>
            <tbody>
                <tr><td colspan="6" style="text-align: center; color: #999;">Loading recent games...</td></tr>
            </tbody>
        </table>

        <div id="updated" class="last-updated">Last updated: Loading...</div>
    </div>

    <script>
        // 從JSON文件讀取數據
        async function loadStats() {
            try {
                const response = await fetch('./data.json?cache=' + Date.now());
                const data = await response.json();
                
                displaySeasonStats(data.seasonStats);
                displayCareerStats(data.careerStats);
                displayRecentGames(data.recentGames);
                updateTimestamp(data.lastUpdated);
                
            } catch (error) {
                console.error('Error loading stats:', error);
                // 使用預設數據
                loadFallbackData();
            }
        }

        function displaySeasonStats(stats) {
            const container = document.getElementById('seasonStats');
            container.innerHTML = Object.entries(stats).map(([label, value]) => `
                <div class="stat-card">
                    <div class="stat-label">${label}</div>
                    <div class="stat-value">${value}</div>
                </div>
            `).join('');
        }

        function displayCareerStats(stats) {
            const container = document.getElementById('careerStats');
            container.innerHTML = Object.entries(stats).map(([label, value]) => `
                <div class="milestone-card">
                    <div class="milestone-label">${label}</div>
                    <div class="milestone-value">${value}</div>
                </div>
            `).join('');
        }

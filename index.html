<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tpingzy Stats Lab</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      background: #0a0a0f;
      color: #fff;
      font-family: Arial;
      text-align: center;
    }
    h1 {
      color: #9b5cff;
    }
    .card {
      background: #1a1a2e;
      padding: 20px;
      margin: 10px;
      border-radius: 15px;
      display: inline-block;
      width: 150px;
    }
  </style>
</head>

<body>

<h1>🦄 Tpingzy Stats Lab</h1>
<p>"Who the f*** is Tingus Pingus?"</p>

<div id="stats"></div>

<canvas id="chart" width="400" height="200"></canvas>

<script>
const playerId = 322; // KP ID

async function loadData() {
  const res = await fetch(`https://www.balldontlie.io/api/v1/stats?player_ids[]=${playerId}&per_page=10`);
  const data = await res.json();

  let totalPoints = 0;
  let games = [];

  data.data.forEach(game => {
    totalPoints += game.pts;
    games.push(game.pts);
  });

  document.getElementById("stats").innerHTML = `
    <div class="card">🔥 PTS (last game)<br>${games[0]}</div>
    <div class="card">📊 Last 10 Total<br>${totalPoints}</div>
  `;

  new Chart(document.getElementById("chart"), {
    type: 'line',
    data: {
      labels: games.map((_, i) => "Game " + (i+1)),
      datasets: [{
        label: "Points",
        data: games
      }]
    }
  });
}

loadData();
</script>

</body>
</html>

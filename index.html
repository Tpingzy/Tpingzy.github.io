<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tpingzy Stats Lab</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      background: #0a0a0f;
      color: #fff;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      color: #9b5cff;
    }

    .card {
      background: #1a1a2e;
      padding: 20px;
      margin: 10px;
      border-radius: 15px;
      display: inline-block;
      width: 160px;
    }
  </style>
</head>

<body>

<h1>🦄 Tpingzy Stats Lab</h1>
<p>"Who the fuck is Tingus Pingus?"</p>

<div id="stats">Loading...</div>

<canvas id="chart" width="400" height="200"></canvas>

<script>
async function loadData() {
  try {
    const res = await fetch("https://www.balldontlie.io/v1/players/322");
    const player = await res.json();

    document.getElementById("stats").innerHTML = `
      <div class="card">👤 Player<br>${player.first_name} ${player.last_name}</div>
      <div class="card">📏 Height<br>${player.height_feet || '-'} ft</div>
      <div class="card">🏀 Position<br>${player.position || '-'}</div>
    `;

    new Chart(document.getElementById("chart"), {
      type: 'bar',
      data: {
        labels: ["PTS", "REB", "AST"],
        datasets: [{
          label: "Sample Stats",
          data: [20, 8, 2]
        }]
      }
    });

  } catch (err) {
    document.getElementById("stats").innerHTML = "❌ API blocked（免費API限制）";
  }
}

loadData();
</script>

</body>
</html>

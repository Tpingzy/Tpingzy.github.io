<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Who is Tingus Pingus?!</title>
    <style>
        /* Tingus Pingus Knicks Style */
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #006BB6; /* Knicks Blue */
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: #F58426; /* Knicks Orange */
            border: 5px dashed white;
            padding: 30px;
            box-shadow: 10px 10px 0px black;
        }
        h1 {
            font-size: 3em;
            text-transform: uppercase;
            text-shadow: 3px 3px black;
            margin-bottom: 5px;
        }
        .quote {
            font-style: italic;
            font-size: 1.2em;
            background: black;
            color: yellow;
            padding: 10px;
            display: inline-block;
            margin-bottom: 20px;
            transform: rotate(-2deg);
        }
        .stats-card {
            background: white;
            color: black;
            margin: 15px 0;
            padding: 20px;
            border: 3px solid black;
            border-radius: 10px;
            font-size: 1.2em;
        }
        .stats-card h2 {
            margin-top: 0;
            color: #006BB6;
            text-decoration: underline;
        }
        .stat-line {
            display: flex;
            justify-content: space-around;
            font-weight: bold;
            margin: 10px 0;
        }
        .footer { margin-top: 20px; font-size: 0.8em; color: #ddd; }
        .update-time { font-size: 0.7em; margin-top: 10px; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦄 Tingus Pingus Tracker</h1>
        <div class="quote">"I never heard of Lativia! Who the f*** is this guy?!"</div>

        <div class="stats-card">
            <h2>🏆 Current Season Avg (2025-26)</h2>
            <div id="main-content">
                <div class="stat-line">
                    <div>PTS: <span id="pts">--</span></div>
                    <div>REB: <span id="reb">--</span></div>
                    <div>BLK: <span id="blk">--</span></div>
                </div>
            </div>
        </div>

        <div class="stats-card">
            <h2>🐐 Career Average (Since 2015)</h2>
            <div class="stat-line">
                <div>AVG PTS: <span id="avg-pts">--</span></div>
                <div>AVG BLK: <span id="avg-blk">--</span></div>
            </div>
        </div>

        <div class="update-time" id="update-time">Detecting Unicorn...</div>
    </div>

    <div class="footer">
        Data auto-updates daily. 🇱🇻 The Lativian Unicorn.
    </div>

    <script>
        async function loadStats() {
            try {
                // 讀取數據，加上時間戳防止瀏覽器快取舊數據
                const response = await fetch('data.json?t=' + new Date().getTime());
                if (!response.ok) throw new Error("搵唔到數據檔");
                
                const data = await response.json();
                
                // 相容不同版本的 key 名稱
                const allStats = data.career_stats || data.stats;
                
                if (!allStats || allStats.length === 0) {
                    throw new Error("數據列表係空的");
                }

                // 1. 顯示最新一季數據 (Array 的最後一個)
                const latest = allStats[allStats.length - 1];
                document.getElementById('pts').innerText = latest.pts;
                document.getElementById('reb').innerText = latest.reb;
                document.getElementById('blk').innerText = latest.blk;

                // 2. 計算生涯平均
                const count = allStats.length;
                const totalPts = allStats.reduce((sum, s) => sum + s.pts, 0);
                const totalBlk = allStats.reduce((sum, s) => sum + s.blk, 0);
                
                document.getElementById('avg-pts').innerText = (totalPts / count).toFixed(1);
                document.getElementById('avg-blk').innerText = (totalBlk / count).toFixed(1);

                // 3. 更新時間
                if (data.last_updated) {
                    const date = new Date(data.last_updated);
                    document.getElementById('update-time').innerText = "Last Updated: " + date.toLocaleString();
                }

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('main-content').innerHTML = 
                    "<p style='color:red'>Failed to load unicorn data.<br>The Knicks drafted him again.</p>";
                document.getElementById('update-time').innerText = "Error: " + error.message;
            }
        }

        window.onload = loadStats;
    </script>
</body>
</html>

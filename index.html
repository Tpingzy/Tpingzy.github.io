<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Who is Tingus Pingus?!</title>
    <style>
        /* Tingus Pingus Knicks Style */
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #006BB6; /* Knicks Blue */
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: #F58426; /* Knicks Orange */
            border: 5px dashed white;
            padding: 30px;
            box-shadow: 10px 10px 0px black;
        }
        h1 {
            font-size: 3em;
            text-transform: uppercase;
            text-shadow: 3px 3px black;
            margin-bottom: 5px;
        }
        .quote {
            font-style: italic;
            font-size: 1.2em;
            background: black;
            color: yellow;
            padding: 10px;
            display: inline-block;
            margin-bottom: 20px;
            transform: rotate(-2deg);
        }
        .stats-card {
            background: white;
            color: black;
            margin: 15px 0;
            padding: 20px;
            border: 3px solid black;
            border-radius: 10px;
            font-size: 1.2em;
        }
        .stats-card h2 {
            margin-top: 0;
            color: #006BB6;
            text-decoration: underline;
        }
        .stat-line {
            display: flex;
            justify-content: space-around;
            font-weight: bold;
            margin: 10px 0;
        }
        .footer { margin-top: 20px; font-size: 0.8em; color: #ddd; }
        .update-time { font-size: 0.7em; margin-top: 10px; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦄 Tingus Pingus Tracker</h1>
        <div class="quote">"I never heard of Lativia! Who the f*** is this guy?!"</div>

        <div class="stats-card">
            <h2>🐐 Kristaps Porzingis Career Averages</h2>
            <div id="main-content">
                <div class="stat-line">
                    <div>PTS: <span id="pts">--</span></div>
                    <div>REB: <span id="reb">--</span></div>
                    <div>BLK: <span id="blk">--</span></div>
                </div>
                <div class="stat-line" style="margin-top: 20px; font-size: 0.9em; border-top: 1px solid #ccc; padding-top: 10px;">
                    <div>GP: <span id="gp">--</span></div>
                    <div>AST: <span id="ast">--</span></div>
                    <div>FG%: <span id="fg">--</span></div>
                </div>
            </div>
        </div>

        <div class="update-time" id="update-time">Detecting Unicorn...</div>
    </div>

    <div class="footer">
        Data auto-updates daily. 🇱🇻 The Lativian Unicorn.
    </div>

    <script>
        async function loadStats() {
            try {
                // 加上時間戳防止緩存
                const response = await fetch('data.json?t=' + new Date().getTime());
                if (!response.ok) throw new Error("搵唔到數據檔");
                
                const data = await response.json();
                const s = data.stats;
                
                if (!s || Object.keys(s).length === 0) {
                    throw new Error("數據內容係空的");
                }

                // 直接顯示生涯總計數據
                document.getElementById('pts').innerText = s.pts || "0";
                document.getElementById('reb').innerText = s.reb || "0";
                document.getElementById('blk').innerText = s.blk || "0";
                document.getElementById('gp').innerText = s.games_played || "0";
                document.getElementById('ast').innerText = s.ast || "0";
                document.getElementById('fg').innerText = s.fg_pct ? (s.fg_pct * 100).toFixed(1) + "%" : "--";

                // 更新時間
                if (data.last_updated) {
                    document.getElementById('update-time').innerText = "Last Updated: " + data.last_updated;
                }

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('main-content').innerHTML = 
                    "<p style='color:red'>Failed to load unicorn data.<br>Error: " + error.message + "</p>";
                document.getElementById('update-time').innerText = "Knicks drafted him again.";
            }
        }

        window.onload = loadStats;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kristaps Porzingis Stats</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
        }
        .stat-value {
            font-size: 32px;
            font-weight: bold;
        }
        .loading {
            text-align: center;
            color: #666;
            padding: 40px;
        }
        .error {
            background: #ffebee;
            color: #c33;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏀 Kristaps Porzingis</h1>
        <p class="subtitle">NBA Statistics Dashboard</p>
        
        <div id="loading" class="loading">Loading data...</div>
        <div id="error"></div>
        <div id="stats" class="stats-grid"></div>
    </div>

    <script>
        async function fetchStats() {
            try {
                const response = await fetch('https://api.balldontlie.io/api/v1/players?search=porzingis&per_page=1');
                const data = await response.json();
                
                if (data.data.length === 0) {
                    showError('Player data not found');
                    return;
                }
                
                const player = data.data[0];
                
                const stats = {
                    'Points Per Game': player.stats?.pts || '0',
                    'Rebounds': player.stats?.reb || '0',
                    'Assists': player.stats?.ast || '0',
                    'Height': player.height || 'N/A',
                    'Weight': player.weight || 'N/A',
                    'Team': player.team?.full_name || 'N/A'
                };
                
                displayStats(stats);
                document.getElementById('loading').style.display = 'none';
                
            } catch (error) {
                showError('Unable to fetch data. Please try again later.');
                console.error(error);
                document.getElementById('loading').style.display = 'none';
            }
        }
        
        function displayStats(stats) {
            const statsDiv = document.getElementById('stats');
            statsDiv.innerHTML = Object.entries(stats).map(([label, value]) => `
                <div class="stat-card">
                    <div class="stat-label">${label}</div>
                    <div class="stat-value">${value}</div>
                </div>
            `).join('');
        }
        
        function showError(message) {
            document.getElementById('error').innerHTML = `<div class="error">${message}</div>`;
        }
        
        fetchStats();
        setInterval(fetchStats, 3600000);
    </script>
</body>
</html>
